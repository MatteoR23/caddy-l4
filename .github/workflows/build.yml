name: Build Caddy L4

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      matrix:
        arch: [amd64, arm64]

    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}

    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.caddy.outputs.version }}
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract Caddy version from Dockerfile
        id: caddy
        run: |
          VERSION=$(grep -oP 'FROM caddy:\K[0-9]+\.[0-9]+\.[0-9]+' Dockerfile | head -1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute image name (lowercase)
        id: meta
        run: |
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${{ env.REGISTRY }}/${REPO_LC}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/${{ matrix.arch }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.caddy.outputs.version }}-${{ matrix.arch }}
          provenance: false

  manifest:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04

    permissions:
      packages: write

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${{ needs.build.outputs.image }}"
          VERSION="${{ needs.build.outputs.version }}"

          docker manifest create "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
          docker manifest push "${IMAGE}:${VERSION}"

          docker manifest create "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
          docker manifest push "${IMAGE}:latest"